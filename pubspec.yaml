name: chickenmangame
description: "Chickenman Food Match - A fun match-3 puzzle game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Icons
  hugeicons: ^0.0.7

  # Audio
  audioplayers: ^6.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  spider: ^4.2.2

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/avatars/
    - assets/audio/
